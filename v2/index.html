<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Firefighter Adventures — Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="version-switcher" aria-label="Game version"
     style="position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;gap:6px;font:12px/1 system-ui,sans-serif;background:rgba(0,0,0,.45);padding:4px 8px;border-radius:999px;opacity:.85">
  <a href="../" style="color:#fff;text-decoration:none;padding:2px 6px">v1</a>
  <span aria-current="page" style="color:#ffd54a;font-weight:700;padding:2px 6px">v2</span>
  <a href="../v3/" style="color:#fff;text-decoration:none;padding:2px 6px">v3</a>
</nav>
<div id="stage">
    <canvas id="game"></canvas>

    <div id="hud">
        <div id="instruction">TAP THE FIRE!</div>
        <div id="stars"></div>
        <button id="mute" aria-label="Sound on/off">&#128266;</button>
        <button id="settings-btn" aria-label="Settings">&#9881;&#65039;</button>
    </div>

    <div id="settings" class="hidden">
        <div id="settings-box">
            <h2>OPTIONS</h2>
            <div id="settings-rows"></div>
            <button id="settings-close">DONE</button>
        </div>
    </div>

    <div id="celebrate" class="hidden">
        <div id="banner">GREAT JOB, CHIEF!</div>
        <button id="replay">PLAY AGAIN</button>
    </div>
</div>

<script src="js/sprites.js"></script>
<script src="js/settings.js"></script>
<script src="js/scene.js"></script>
<script src="js/particles.js"></script>
<script src="js/truck.js"></script>
<script src="js/audio.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
